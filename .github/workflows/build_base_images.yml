name: Build Base Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-base:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerimg: ubuntu2004_cuda11
          - dockerimg: fedora39_cuda12

    env:
      DOCKER_FILE: docker/docker_${{ matrix.dockerimg }}
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/nvenc-build
      FFMPEG_DLL_REPO: https://github.com/rigaya/build_scripts.git
      FFMPEG_DLL_REF: master
      NVENC_HEADER_DIR: /opt/nvenc_headers
      AVISYNTH_HEADERS_URL: https://github.com/AviSynth/AviSynthPlus/archive/refs/tags/v3.7.5.tar.gz
      VAPOURSYNTH_HEADERS_URL: https://github.com/vapoursynth/vapoursynth/archive/refs/tags/R72.tar.gz
      VSHIP_HEADERS_URL: https://codeberg.org/Line-fr/Vship/archive/v5.0.0.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Resolve build_scripts revision
        id: build_scripts_rev
        run: |
          REV=$(git ls-remote "${{ env.FFMPEG_DLL_REPO }}" "${{ env.FFMPEG_DLL_REF }}" | awk 'NR==1 {print $1}')
          if [ -z "${REV}" ]; then
            echo "Failed to resolve build_scripts revision for ${{ env.FFMPEG_DLL_REPO }} @ ${{ env.FFMPEG_DLL_REF }}" >&2
            exit 1
          fi
          echo "rev=${REV}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push base image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ${{ env.DOCKER_FILE }}
          push: true
          tags: ${{ env.IMAGE_REPO }}:${{ matrix.dockerimg }}
          build-args: |
            FFMPEG_DLL_REPO=${{ env.FFMPEG_DLL_REPO }}
            FFMPEG_DLL_REF=${{ env.FFMPEG_DLL_REF }}
            FFMPEG_DLL_REV=${{ steps.build_scripts_rev.outputs.rev }}
            NVENC_HEADER_DIR=${{ env.NVENC_HEADER_DIR }}
            AVISYNTH_HEADERS_URL=${{ env.AVISYNTH_HEADERS_URL }}
            VAPOURSYNTH_HEADERS_URL=${{ env.VAPOURSYNTH_HEADERS_URL }}
            VSHIP_HEADERS_URL=${{ env.VSHIP_HEADERS_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


